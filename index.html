<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kakkathode Bridge | Interactive BIM Viewer</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Model Viewer Component -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --accent: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: var(--bg-dark);
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
        }

        /* 3D Viewer Canvas */
        model-viewer { 
            width: 100%; 
            height: 100vh; 
            --progress-bar-color: var(--accent);
            --progress-bar-height: 4px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            outline: none;
        }

        /* Glassmorphism Info Panel */
        .info-panel { 
            position: absolute; 
            top: 24px; 
            left: 24px; 
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 24px; 
            border-radius: 16px; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); 
            pointer-events: auto; 
            max-width: 320px;
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
            transition: padding 0.3s ease;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            gap: 12px;
        }

        .panel-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .toggle-btn {
            display: none;
            width: 32px;
            height: 32px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            color: #94a3b8;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .toggle-btn svg {
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .info-panel.minimized .toggle-btn svg {
            transform: rotate(180deg);
        }

        .panel-body {
            overflow: hidden;
            max-height: 500px;
            transition: max-height 0.35s cubic-bezier(0.16, 1, 0.3, 1), 
                        opacity 0.25s ease,
                        margin-top 0.3s ease;
            opacity: 1;
            margin-top: 0;
        }

        .info-panel.minimized .panel-body {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
        }

        .info-panel.minimized {
            padding: 14px 18px;
        }

        .info-panel.minimized .tag {
            margin-bottom: 0;
        }

        .info-panel.minimized h2 {
            margin-bottom: 0;
            font-size: 16px;
        }

        @keyframes slideIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .tag {
            display: inline-block;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        h2 { 
            margin: 0 0 8px 0; 
            font-size: 22px; 
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { 
            margin: 0 0 16px 0; 
            font-size: 14px; 
            color: var(--text-muted); 
            line-height: 1.5;
        }

        .controls-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #cbd5e1;
        }

        .control-icon {
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* AR Button Customization */
        .ar-button {
            position: absolute;
            bottom: 32px;
            right: 32px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ar-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(59, 130, 246, 0.5);
        }

        .ar-button:active {
            transform: translateY(1px);
        }

        /* Custom Loading Poster */
        #poster {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
            z-index: 10;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(59, 130, 246, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        .loading-text {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            animation: pulse 1.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            to { opacity: 0.5; }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .info-panel {
                top: auto;
                bottom: 16px;
                left: 12px;
                right: 12px;
                max-width: none;
                pointer-events: auto;
            }

            .toggle-btn {
                display: flex;
            }
            
            .ar-button {
                bottom: auto;
                top: 24px;
                right: 16px;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>

    <model-viewer 
        src="./bridge_model.glb?v=4" 
        camera-controls 
        interaction-prompt="auto" 
        shadow-intensity="1.5" 
        shadow-softness="0.2"
        exposure="1.1"
        environment-image="neutral"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-orbit="45deg 60deg auto">
        
        <!-- Custom AR Button -->
        <button slot="ar-button" class="ar-button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3h6l-3 3"/>
                <path d="M21 3h-6l3 3"/>
                <path d="M3 21h6l-3-3"/>
                <path d="M21 21h-6l3-3"/>
                <rect x="7" y="7" width="10" height="10" rx="2"/>
            </svg>
            View in AR
        </button>

        <!-- Custom Loading Screen -->
        <div slot="poster" id="poster">
            <div class="loader"></div>
            <div class="loading-text">Loading 3D BIM Model...</div>
        </div>
    </model-viewer>

    <!-- Glassmorphism Overlay -->
    <div class="info-panel" id="infoPanel">
        <div class="panel-header" onclick="togglePanel()">
            <div class="panel-header-left">
                <span class="tag">Navakerala Sadas</span>
                <h2>Kakkathode Bridge</h2>
            </div>
            <button class="toggle-btn" id="toggleBtn" aria-label="Toggle panel">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 15 12 9 18 15"></polyline>
                </svg>
            </button>
        </div>
        <div class="panel-body">
            <p>Interactive DPR-accurate structural model. Verified dimensions, footings, and approach roads.</p>
            <div class="controls-list">
                <div class="control-item">
                    <div class="control-icon">👆</div>
                    <span>Drag to rotate</span>
                </div>
                <div class="control-item">
                    <div class="control-icon">🔍</div>
                    <span>Pinch or scroll to zoom</span>
                </div>
                <div class="control-item">
                    <div class="control-icon">✌️</div>
                    <span>Two fingers to pan</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePanel() {
            document.getElementById('infoPanel').classList.toggle('minimized');
        }

        // Auto-minimize on mobile
        if (window.innerWidth <= 768) {
            document.getElementById('infoPanel').classList.add('minimized');
        }
    </script>

</body>
</html>
