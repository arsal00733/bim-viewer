<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1120">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>BIM Viewer — Site Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: #0b1120;
    --surface: rgba(15,23,42,0.8);
    --accent: #3b82f6;
    --text-main: #f1f5f9;
    --text-muted: #64748b;
    --glass-border: rgba(255,255,255,0.08);
}
body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.header {
    text-align: center;
    padding: 40px 20px 20px;
}
.header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(to right, #fff, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.header p {
    color: var(--text-muted);
    font-size: 15px;
    margin-top: 8px;
}
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 1100px;
    width: 100%;
}
.site-card {
    background: var(--surface);
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
}
.site-card:hover {
    border-color: rgba(59,130,246,0.4);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}
.site-card .tag {
    display: inline-block;
    background: rgba(59,130,246,0.2);
    color: #60a5fa;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(59,130,246,0.25);
    align-self: flex-start;
}
.site-card h2 {
    font-size: 20px;
    font-weight: 600;
    margin: 4px 0 2px;
}
.site-card .location {
    color: var(--text-muted);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
}
.site-card .desc {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.5;
    flex: 1;
}
.site-card .stages-count {
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid var(--glass-border);
    padding-top: 10px;
    margin-top: auto;
}
.empty-state {
    color: var(--text-muted);
    text-align: center;
    padding: 60px 20px;
    font-size: 15px;
    grid-column: 1 / -1;
}
@media (max-width: 600px) {
    .header h1 { font-size: 22px; }
    .gallery { grid-template-columns: 1fr; padding: 12px; }
    .site-card { padding: 18px; }
}
</style>
</head>
<body>
<div class="header">
    <h1>BIM Viewer</h1>
    <p>Select a site to explore its 3D construction sequence</p>
</div>
<div class="gallery" id="gallery"></div>
<script>
(async () => {
    const res = await fetch('data/sites.json');
    const data = await res.json();
    const gallery = document.getElementById('gallery');
    if (!data.sites || data.sites.length === 0) {
        gallery.innerHTML = '<div class="empty-state">No sites available yet.</div>';
        return;
    }
    data.sites.forEach(site => {
        const card = document.createElement('a');
        card.className = 'site-card';
        card.href = 'viewer.html?site=' + encodeURIComponent(site.id);
        card.innerHTML = `
            <span class="tag">${site.tag || ''}</span>
            <h2>${site.name}</h2>
            <div class="location">${site.location || ''}</div>
            <div class="desc">${site.description || ''}</div>
            <div class="stages-count">${site.stages.length} construction stages</div>
        `;
        gallery.appendChild(card);
    });
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
